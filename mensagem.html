<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>✨💖 MENSAGEM ESPECIAL 💖✨</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: repeating-linear-gradient(
      45deg,
      #ff00ff,
      #ff00ff 10px,
      #00ffff 10px,
      #00ffff 20px
    );
    font-family: "Comic Sans MS", "Comic Sans", cursive;
    overflow: hidden;
  }

  .card {
    background: #fff0f7;
    border: 8px dashed #ff1493;
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 0 40px #ffea00, 0 0 80px #ff00ff inset;
    animation: pulse 1.2s infinite alternate;
}

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.03); }
  }

  h1 {
    font-size: 2em;
    color: #d6006c;
    text-shadow: 2px 2px 0 #ffea00, -2px -2px 0 #00b7ff;
    margin-bottom: 10px;
  }

  .sub {
    font-size: 1.4em;
    color: #6a00ff;
    margin: 15px 0;
    text-shadow: 1px 1px 0 #fff;
  }

  .footer {
    font-size: 1.6em;
    font-weight: bold;
    color: #ff5e00;
    text-shadow: 2px 2px 0 #000;
    margin-top: 20px;
  }

  .stars {
    font-size: 1.5em;
  }

  marquee {
    background: #000;
    color: #0f0;
    padding: 8px;
    font-weight: bold;
    border-radius: 10px;
    margin-top: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="stars">⭐💫✨🌟✨💫⭐</div>
    <h1>RESPONDER SEUS AMIGÕES</h1>
    <div class="sub">TEM ALGUM VALOR? 🤔💎</div>
    <marquee scrollamount="6">★ s2 IAGUINHO CABULOSO s2 ★ s2 IAGUINHO CABULOSO s2 ★</marquee>
    <div class="footer">s2 Iaguinho Cabuloso s2</div>
    <div class="stars">🔥🎉💖🎉🔥</div>
  </div>

</body>
</html>
